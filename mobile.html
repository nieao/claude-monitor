<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e14">
<title>Claude Monitor</title>
<style>
:root{--bg-0:#0a0e14;--bg-1:#0d1117;--bg-2:#161b22;--bg-3:#1c2333;--border:#30363d;--t1:#e6edf3;--t2:#8b949e;--t3:#484f58;--blue:#58a6ff;--green:#3fb950;--orange:#d29922;--red:#f85149;--purple:#bc8cff;--teal:#39d2c0;--glow-g:rgba(63,185,80,.5);--tab-h:56px;--hdr-h:48px;--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg-0);color:var(--t1);min-height:100vh;overflow:hidden;font-size:15px}

/* ── Header ── */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg-2);border-bottom:1px solid var(--border);z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.lang-btn{background:none;border:1px solid var(--border);color:var(--t2);font-size:11px;padding:2px 8px;border-radius:10px;cursor:pointer;font-family:inherit;transition:all .2s}
.lang-btn:hover{border-color:var(--blue);color:var(--t1)}
.hdr-title{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-r{display:flex;align-items:center;gap:10px}
.ws-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
.ws-dot.off{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 4px var(--glow-g)}50%{opacity:.5;box-shadow:0 0 12px var(--glow-g)}}
.ws-txt{font-size:11px;color:var(--t2)}
.clock{font-size:12px;color:var(--t3);font-variant-numeric:tabular-nums}

/* ── Tab Content Area ── */
.tab-content{position:fixed;top:var(--hdr-h);left:0;right:0;bottom:calc(var(--tab-h) + var(--safe-b));overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.tab-page{display:none;padding:12px 12px 16px;min-height:100%}
.tab-page.active{display:block}

/* ── Bottom Tabs ── */
.tabs{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-b));padding-bottom:var(--safe-b);display:flex;background:var(--bg-2);border-top:1px solid var(--border);z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 0;cursor:pointer;transition:all .2s;border:none;background:none;color:var(--t3);font-family:inherit;font-size:11px;position:relative}
.tab.active{color:var(--blue)}
.tab.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--blue);border-radius:0 0 2px 2px}
.tab-icon{font-size:20px;line-height:1}
.tab-badge{position:absolute;top:4px;right:calc(50% - 18px);min-width:16px;height:16px;border-radius:8px;background:var(--green);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* ── Shared Components ── */
.card{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.card.glow-g{border-color:var(--green);box-shadow:0 0 12px rgba(63,185,80,.08)}
.card.glow-o{border-color:var(--orange)}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg-3)}
.card-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-body{padding:12px 14px}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge-g{background:rgba(63,185,80,.15);color:var(--green)}
.badge-b{background:rgba(88,166,255,.1);color:var(--blue)}
.badge-o{background:rgba(210,153,34,.15);color:var(--orange)}
.badge-p{background:rgba(188,140,255,.15);color:var(--purple)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-g{background:var(--green);animation:pulse 2s ease-in-out infinite}
.dot-o{background:var(--orange)}
.dot-idle{background:var(--t3)}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(48,54,61,.3);font-size:14px}
.row:last-child{border-bottom:none}
.row-l{color:var(--t2)}.row-v{color:var(--t1);font-weight:600}
.section-title{font-size:13px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding:0 2px}
.section-title:first-child{margin-top:0}
.empty{text-align:center;padding:32px 16px;color:var(--t3);font-size:14px}

/* ── Overview Tab ── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:var(--bg-3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:26px;font-weight:700;line-height:1.2}
.stat-num.g{color:var(--green)}.stat-num.b{color:var(--blue)}.stat-num.o{color:var(--orange)}.stat-num.p{color:var(--purple)}
.stat-lbl{font-size:12px;color:var(--t3);margin-top:2px}

.live-session{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(48,54,61,.3)}
.live-session:last-child{border-bottom:none}
.live-info{flex:1;min-width:0}
.live-name{font-size:14px;font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.live-detail{font-size:12px;color:var(--t2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.live-model{font-size:11px;color:var(--purple);text-align:right;white-space:nowrap}

/* ── Projects Tab ── */
.filter-bar{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.filter-bar::-webkit-scrollbar{display:none}
.fbtn{padding:7px 16px;border-radius:16px;border:1px solid var(--border);background:none;color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s}
.fbtn.on{background:rgba(88,166,255,.15);border-color:var(--blue);color:var(--blue)}
.filter-info{font-size:11px;color:var(--t3);display:flex;align-items:center;white-space:nowrap;margin-left:auto}

.proj-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-path{font-size:10px;color:var(--t3);padding:4px 14px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-bottom:1px solid rgba(48,54,61,.3)}
.proj-badges{display:flex;gap:4px;flex-shrink:0}

/* Session Item */
.sess{padding:10px 14px;border-bottom:1px solid rgba(48,54,61,.3);cursor:pointer;transition:background .15s}
.sess:last-child{border-bottom:none}
.sess:active{background:rgba(88,166,255,.05)}
.sess-r1{display:flex;align-items:center;gap:8px}
.sess-id{font-size:13px;font-weight:600;color:var(--t2)}
.sess-model{font-size:11px;color:var(--purple)}
.sess-branch{font-size:11px;color:var(--teal)}
.sess-age{margin-left:auto;font-size:11px;color:var(--t3);font-variant-numeric:tabular-nums}
.sess-sum{font-size:13px;color:var(--t2);margin:4px 0 2px 16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sess-prompt{font-size:13px;color:var(--t1);margin:2px 0 2px 16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.8}
.sess-meta{display:flex;gap:10px;flex-wrap:wrap;margin:4px 0 0 16px;font-size:12px;color:var(--t3)}
.sess-meta .v{color:var(--t2);font-weight:500}
.sess-tool{margin:4px 0 0 16px;font-size:11px;color:var(--orange);display:flex;align-items:center;gap:4px}
.sess-tok{display:flex;gap:8px;margin:2px 0 0 16px;font-size:10px;color:var(--t3)}

/* Conversation */
.convo{margin:8px 0 4px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg-0);overflow:hidden}
.convo-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg-3);cursor:pointer;user-select:none;font-size:12px;color:var(--t2)}
.convo-arr{font-size:9px;transition:transform .2s}.convo-arr.open{transform:rotate(90deg)}
.convo-body{display:none;padding:6px 0;max-height:50vh;overflow-y:auto}
.convo-body.open{display:block}
.cv{display:flex;gap:8px;padding:6px 12px;font-size:12px;line-height:1.4}
.cv-role{flex-shrink:0;width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin-top:1px}
.cv-role.u{background:rgba(88,166,255,.2);color:var(--blue)}
.cv-role.a{background:rgba(188,140,255,.2);color:var(--purple)}
.cv-role.t{background:rgba(210,153,34,.2);color:var(--orange)}
.cv-content{flex:1;min-width:0}
.cv-text{color:var(--t2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.cv-tools{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.cv-tool-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(210,153,34,.12);color:var(--orange);border:1px solid rgba(210,153,34,.2)}

/* Idle toggle */
.idle-toggle{padding:10px 14px;font-size:12px;color:var(--t3);cursor:pointer;display:flex;align-items:center;gap:6px}
.idle-toggle:active{color:var(--t2)}
.idle-arr{font-size:9px;transition:transform .2s}.idle-arr.open{transform:rotate(90deg)}
.idle-box{display:none}.idle-box.open{display:block}

/* ── Stats Tab ── */
.bar-chart{display:flex;align-items:flex-end;gap:2px;height:80px;margin:8px 0}
.bar{flex:1;background:var(--blue);opacity:.5;border-radius:2px 2px 0 0;min-width:4px;transition:height .5s}
.bar:active{opacity:1}
.bar-labels{display:flex;gap:2px;margin-bottom:4px}
.bar-labels>div{flex:1;text-align:center;font-size:8px;color:var(--t3)}
.model-bar{margin-bottom:10px}
.model-hdr{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.model-name{color:var(--t2)}.model-val{color:var(--t3);font-variant-numeric:tabular-nums}
.model-track{height:6px;border-radius:3px;background:var(--bg-0);overflow:hidden}
.model-fill{height:100%;border-radius:3px;transition:width .8s}
.model-fill.opus{background:linear-gradient(90deg,#6e40c9,#bc8cff)}
.model-fill.sonnet{background:linear-gradient(90deg,#1f6feb,#58a6ff)}
.model-fill.haiku{background:linear-gradient(90deg,#238636,#3fb950)}

/* ── Teams Tab ── */
.team-card{margin-bottom:12px}
.team-name{font-size:14px;font-weight:600;color:var(--t1)}
.team-status{font-size:11px;color:var(--green)}
.team-desc{font-size:11px;color:var(--t3);padding:4px 14px;border-bottom:1px solid rgba(48,54,61,.3)}

/* Agent Card (rich) */
.acard-m{border:2px solid var(--border);border-radius:12px;background:var(--bg-3);margin-bottom:10px;overflow:hidden;transition:all .3s;cursor:pointer}
.acard-m:active{border-color:var(--blue)}
.acard-m.lead{background:linear-gradient(180deg,#2a1a1a,var(--bg-3));border-color:#8b4c4c}
.acard-m.mate{background:linear-gradient(180deg,#1a2a3a,var(--bg-3));border-color:#4c6b8b}
.acard-m.active{box-shadow:0 0 14px var(--glow-g);border-color:var(--green)!important}
.acard-m-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(48,54,61,.4)}
.acard-m-avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.acard-m-avatar.lead{background:rgba(248,81,73,.15);color:var(--red);border:2px solid rgba(248,81,73,.3)}
.acard-m-avatar.mate{background:rgba(88,166,255,.15);color:var(--blue);border:2px solid rgba(88,166,255,.3)}
.acard-m-avatar.active{box-shadow:0 0 8px var(--glow-g);border-color:var(--green)}
.acard-m-info{flex:1;min-width:0}
.acard-m-name{font-size:15px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:6px}
.acard-m-role{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.acard-m-role.lead-r{background:rgba(248,81,73,.12);color:var(--red)}
.acard-m-role.mate-r{background:rgba(88,166,255,.12);color:var(--blue)}
.acard-m-sub{font-size:11px;color:var(--t2);display:flex;gap:8px;margin-top:2px;flex-wrap:wrap}
.acard-m-status{font-size:11px;font-weight:600;flex-shrink:0;display:flex;align-items:center;gap:4px}
.acard-m-status.on{color:var(--green)}.acard-m-status.off{color:var(--t3)}
.acard-m-status .sd{width:7px;height:7px;border-radius:50%}
.acard-m-status.on .sd{background:var(--green);box-shadow:0 0 4px var(--glow-g);animation:pulse 2s ease-in-out infinite}
.acard-m-status.off .sd{background:var(--t3)}
.acard-m-body{padding:10px 14px}
.acard-m-desc{font-size:12px;color:var(--t2);margin-bottom:8px;line-height:1.4}
.acard-m-section{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.acard-m-tasks{display:flex;flex-direction:column;gap:4px}
.acard-m-task{display:flex;align-items:center;gap:6px;font-size:12px;padding:3px 0;border-bottom:1px solid rgba(48,54,61,.15)}
.acard-m-task:last-child{border-bottom:none}
.acard-m-task .td{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.acard-m-task .td.done{background:var(--green)}.acard-m-task .td.prog{background:var(--orange)}.acard-m-task .td.pend{background:var(--t3)}
.acard-m-task .tt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t2)}
.acard-m-task .tt.done{color:var(--t3);text-decoration:line-through}
.acard-m-footer{display:flex;gap:6px;padding:8px 14px;border-top:1px solid rgba(48,54,61,.4);flex-wrap:wrap}
.acard-m-tag{font-size:9px;padding:3px 8px;border-radius:5px;display:flex;align-items:center;gap:3px}
.acard-m-tag.msgs{background:rgba(210,153,34,.1);color:var(--orange)}
.acard-m-tag.inbox{background:rgba(88,166,255,.08);color:var(--blue)}
.acard-m-notask{font-size:12px;color:var(--t3);font-style:italic;padding:4px 0}

/* Shared Task List (mobile) */
.tnode-m{border:2px solid var(--teal);border-radius:12px;background:rgba(57,210,192,.06);padding:12px 14px;margin-bottom:10px}
.tnode-m-title{font-size:13px;font-weight:600;color:var(--teal);margin-bottom:6px}
.tnode-m-stats{font-size:10px;color:var(--t3);margin-bottom:8px;display:flex;gap:10px}
.tnode-m-item{display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(48,54,61,.2)}
.tnode-m-item:last-child{border-bottom:none}
.tnode-m-item .td{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tnode-m-item .td.done{background:var(--green)}.tnode-m-item .td.prog{background:var(--orange)}.tnode-m-item .td.pend{background:var(--t3)}
.tnode-m-item .tt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t2)}
.tnode-m-item .tt.done{color:var(--t3);text-decoration:line-through}
.tnode-m-item .to{font-size:9px;color:var(--t3);flex-shrink:0}

.task-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(48,54,61,.2);font-size:12px}
.task-item:last-child{border-bottom:none}
.task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.task-dot.done{background:var(--green)}.task-dot.prog{background:var(--orange)}.task-dot.pend{background:var(--t3)}
.task-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t2)}
.task-owner{font-size:10px;color:var(--t3);flex-shrink:0}

.msg-item{display:flex;flex-direction:column;gap:2px;padding:8px 0;border-bottom:1px solid rgba(48,54,61,.2);font-size:12px}
.msg-item:last-child{border-bottom:none}
.msg-header{display:flex;align-items:center;gap:6px}
.msg-from{color:var(--blue);font-weight:500}
.msg-arrow{color:var(--t3);font-size:10px}
.msg-to{color:var(--teal)}
.msg-type{font-size:9px;padding:1px 6px;border-radius:4px;margin-left:auto}
.msg-type.task{background:rgba(210,153,34,.15);color:var(--orange)}
.msg-type.idle{background:rgba(72,79,88,.2);color:var(--t3)}
.msg-type.message{background:rgba(88,166,255,.1);color:var(--blue)}
.msg-text{color:var(--t3);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:2px}

/* Activity Item */
.act-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(48,54,61,.2);font-size:13px}
.act-item:last-child{border-bottom:none}
.act-time{font-size:11px;color:var(--t3);min-width:55px;font-variant-numeric:tabular-nums}
.act-body{flex:1;min-width:0}
.act-text{color:var(--t2);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.3}
.act-proj{font-size:10px;color:var(--blue);margin-top:2px;opacity:.7}

/* ── Inbox Sheet ── */
.inbox-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:none;backdrop-filter:blur(4px)}
.inbox-overlay.open{display:block}
.inbox-sheet{position:fixed;left:0;right:0;bottom:0;max-height:85vh;background:var(--bg-2);border-radius:16px 16px 0 0;z-index:201;transform:translateY(100%);transition:transform .3s ease;display:flex;flex-direction:column;padding-bottom:var(--safe-b)}
.inbox-sheet.open{transform:translateY(0)}
.inbox-handle{width:36px;height:4px;border-radius:2px;background:var(--t3);margin:8px auto}
.inbox-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 12px}
.inbox-title{font-size:15px;font-weight:600;color:var(--t1)}
.inbox-close{background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;padding:4px 8px}
.inbox-msgs{flex:1;overflow-y:auto;padding:4px 0;min-height:100px;max-height:50vh;-webkit-overflow-scrolling:touch}
.inbox-msg{display:flex;gap:8px;padding:10px 16px;font-size:13px;border-bottom:1px solid rgba(48,54,61,.2)}
.inbox-msg:last-child{border-bottom:none}
.inbox-msg-from{color:var(--blue);font-weight:600;min-width:80px;flex-shrink:0;font-size:11px}
.inbox-msg-from.human{color:var(--green)}
.inbox-msg-body{flex:1;min-width:0}
.inbox-msg-text{color:var(--t2);word-break:break-word;line-height:1.4}
.inbox-msg-meta{display:flex;gap:8px;margin-top:3px;font-size:10px;color:var(--t3)}
.inbox-msg-type{font-size:9px;padding:2px 6px;border-radius:4px;flex-shrink:0;align-self:flex-start;margin-top:2px}
.inbox-msg-type.message{background:rgba(88,166,255,.1);color:var(--blue)}
.inbox-msg-type.task{background:rgba(210,153,34,.15);color:var(--orange)}
.inbox-msg-type.idle{background:rgba(72,79,88,.2);color:var(--t3)}
.inbox-msg-type.shutdown{background:rgba(248,81,73,.15);color:var(--red)}
.inbox-send{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);background:var(--bg-3)}
.inbox-input{flex:1;background:var(--bg-0);border:1px solid var(--border);border-radius:8px;color:var(--t1);font-family:inherit;font-size:14px;padding:10px 12px;resize:none;outline:none;min-height:40px;max-height:80px}
.inbox-input:focus{border-color:var(--blue)}
.inbox-input::placeholder{color:var(--t3)}

.hl-pend{color:var(--t2);font-style:italic}
.hl-tool{color:var(--purple);font-weight:500}
.hl-team{color:var(--teal);font-weight:500}
.hl-err{color:var(--red);font-weight:600}

.m-pie-hole{position:absolute;top:7px;left:7px;right:7px;bottom:7px;border-radius:50%;background:var(--bg-3);display:flex;align-items:center;justify-content:center}
.m-pie-pct{font-size:12px;font-weight:800;color:var(--green);line-height:1}
.m-pie-info{flex:1;min-width:0}
.m-pie-main{font-size:13px;color:var(--t1);font-weight:600}
.m-pie-legend{display:flex;gap:8px;margin-top:4px}
.m-pie-legend-i{font-size:9px;display:flex;align-items:center;gap:3px;color:var(--t3)}
.m-pie-legend-d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.m-pie-eta{display:flex;align-items:center;gap:5px;margin-top:4px}
.m-pie-eta-icon{font-size:12px;color:var(--teal)}
.m-pie-eta-time{font-size:14px;font-weight:700;color:var(--teal);font-variant-numeric:tabular-nums;letter-spacing:.5px}
.m-pie-eta-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px}
.m-pie-alldone{font-size:12px;color:var(--green);font-weight:600;margin-top:4px}

/* ── Agent Current Task Banner (Mobile) ── */
.acard-m-current{padding:10px 14px;background:linear-gradient(90deg,rgba(210,153,34,.12),rgba(210,153,34,.04));border-bottom:2px solid rgba(210,153,34,.3);display:flex;align-items:center;gap:8px}
.acard-m-current-spinner{width:14px;height:14px;border:2px solid rgba(210,153,34,.3);border-top-color:var(--orange);border-radius:50%;animation:spin 1s linear infinite;flex-shrink:0}
.acard-m-current-label{font-size:10px;color:var(--orange);text-transform:uppercase;letter-spacing:.5px;font-weight:700;white-space:nowrap}
.acard-m-current-text{font-size:14px;color:var(--orange);font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-shadow:0 0 12px rgba(210,153,34,.3)}

/* ── Agent Progress Bar (Mobile) ── */
.m-aprog{height:4px;background:var(--bg-0);border-radius:2px;margin:8px 14px 0;overflow:hidden}
.m-aprog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--teal));transition:width .8s}
.m-aprog-label{font-size:10px;color:var(--t3);padding:2px 14px 0;display:flex;justify-content:space-between}
.m-aprog-label .v{color:var(--green);font-weight:600}

/* ── Agent Reasoning Terminal (Mobile) ── */
.m-areason{margin:8px 14px;background:var(--bg-0);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.m-areason-hdr{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:6px 10px;border-bottom:1px solid rgba(48,54,61,.4);display:flex;align-items:center;gap:5px}
.m-areason-hdr .pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
.m-areason-body{padding:4px 0;max-height:160px;overflow-y:auto;font-size:12px;line-height:1.5;-webkit-overflow-scrolling:touch}
.m-areason-line{padding:3px 10px;color:var(--t2);border-left:2px solid transparent;word-break:break-word}
.m-areason-line:active{background:rgba(88,166,255,.03);border-left-color:var(--blue)}
.m-areason-line .prefix{color:var(--teal);margin-right:4px}
.m-areason-tools{display:flex;gap:4px;flex-wrap:wrap;padding:3px 10px}
.m-areason-tool{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(188,140,255,.1);color:var(--purple)}
.m-areason-activity{padding:6px 10px;font-size:12px;display:flex;align-items:center;gap:6px}

.m-areason-activity .act-text{color:var(--orange);font-weight:500}

/* ── Team Progress Bar (Mobile) ── */
.m-team-prog{padding:8px 14px 0}
.m-team-prog-bar{height:6px;background:var(--bg-0);border-radius:3px;overflow:hidden;display:flex}

.m-team-prog-info{font-size:9px;color:var(--t3);margin-top:3px;display:flex;gap:10px}

.m-comm-entry{display:flex;flex-direction:column;gap:3px;padding:8px 0;border-bottom:1px solid rgba(48,54,61,.2);position:relative;padding-left:10px}

.m-comm-to{color:var(--teal);font-weight:500}

.rec-btn.active{border-color:var(--red);color:var(--red);background:rgba(248,81,73,.08)}
.rec-dot{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:all .3s}
.rec-btn.active .rec-dot{background:var(--red);animation:rec-pulse 1.2s ease-in-out infinite}
@keyframes rec-pulse{0%,100%{opacity:1;box-shadow:0 0 4px rgba(248,81,73,.6)}50%{opacity:.4;box-shadow:0 0 10px rgba(248,81,73,.8)}}
.rec-time{font-size:10px;color:var(--red);font-variant-numeric:tabular-nums}

/* ── Recording Sheet (Mobile) ── */
.rec-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:none;backdrop-filter:blur(4px)}
.rec-overlay.open{display:block}
.rec-sheet{position:fixed;left:0;right:0;bottom:0;max-height:85vh;background:var(--bg-2);border-radius:16px 16px 0 0;z-index:201;transform:translateY(100%);transition:transform .3s ease;display:flex;flex-direction:column;padding-bottom:var(--safe-b)}
.rec-sheet.open{transform:translateY(0)}
.rec-handle{width:36px;height:4px;border-radius:2px;background:var(--t3);margin:8px auto}
.rec-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 12px}
.rec-title{font-size:15px;font-weight:600;color:var(--t1)}
.rec-close{background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;padding:4px 8px}
.rec-body{flex:1;overflow-y:auto;padding:8px 16px;max-height:60vh;-webkit-overflow-scrolling:touch}
.rec-status-bar{padding:10px 16px;border-bottom:1px solid var(--border);background:rgba(248,81,73,.04);display:flex;align-items:center;gap:8px;font-size:12px}
.rec-status-bar .rec-dot-lg{width:10px;height:10px;border-radius:50%;background:var(--red);animation:rec-pulse 1.2s ease-in-out infinite;flex-shrink:0}
.rec-status-bar .info{color:var(--t2);flex:1}.rec-status-bar .val{color:var(--t1);font-weight:600}

.rec-item{background:var(--bg-3);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.rec-item-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
.rec-item-id{font-size:13px;font-weight:600;color:var(--t1)}
.rec-item-status{font-size:10px;padding:2px 8px;border-radius:8px}
.rec-item-status.recording{background:rgba(248,81,73,.15);color:var(--red)}
.rec-item-status.completed{background:rgba(63,185,80,.15);color:var(--green)}
.rec-item-meta{display:flex;gap:8px;padding:0 14px 8px;font-size:11px;color:var(--t3);flex-wrap:wrap}
.rec-item-meta .v{color:var(--t2);font-weight:500}
.rec-item-actions{display:flex;gap:6px;padding:8px 14px;border-top:1px solid var(--border);flex-wrap:wrap}
.rec-action{font-size:11px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--t2);cursor:pointer;font-family:inherit;transition:all .2s}
.rec-action:active{border-color:var(--blue);color:var(--blue);background:rgba(88,166,255,.05)}
.rec-action.primary{background:rgba(88,166,255,.1);border-color:var(--blue);color:var(--blue)}
.rec-item-files{display:flex;gap:6px;padding:6px 14px;flex-wrap:wrap}
.rec-file-link{font-size:10px;padding:3px 10px;border-radius:6px;background:rgba(63,185,80,.1);color:var(--green);text-decoration:none}
.rec-empty{text-align:center;padding:24px;color:var(--t3);font-size:13px}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-title">Claude Monitor</div>
  <div class="hdr-r">
    <button class="rec-btn" id="recBtn" onclick="toggleRecording()" ontouchstart="recTouchStart(event)" ontouchend="recTouchEnd(event)"><span class="rec-dot"></span><span id="recLabel">REC</span><span class="rec-time" id="recTime" style="display:none"></span></button>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
    <span class="clock" id="clk"></span>
    <div class="ws-dot" id="wsDot"></div>
    <span class="ws-txt" id="wsTxt">LIVE</span>
  </div>
</div>

<!-- Tab Pages -->
<div class="tab-content">
  <!-- Overview -->
  <div class="tab-page active" id="page-overview"></div>
  <!-- Projects -->
  <div class="tab-page" id="page-projects"></div>
  <!-- Stats -->
  <div class="tab-page" id="page-stats"></div>
  <!-- Teams -->
  <div class="tab-page" id="page-teams"></div>
</div>

<!-- Bottom Tab Bar -->
<div class="tabs">
  <button class="tab active" data-tab="overview" onclick="switchTab('overview')">
    <span class="tab-icon">&#9673;</span>
    <span id="tabOverview"></span>
  </button>
  <button class="tab" data-tab="projects" onclick="switchTab('projects')">
    <span class="tab-icon">&#9782;</span>
    <span id="tabProjects"></span>
    <span class="tab-badge" id="projBadge" style="display:none"></span>
  </button>
  <button class="tab" data-tab="stats" onclick="switchTab('stats')">
    <span class="tab-icon">&#9636;</span>
    <span id="tabStats"></span>
  </button>
  <button class="tab" data-tab="teams" onclick="switchTab('teams')">
    <span class="tab-icon">&#9673;</span>
    <span id="tabTeams"></span>
    <span class="tab-badge" id="teamBadge" style="display:none"></span>
  </button>
</div>

<!-- Inbox Sheet -->
<div class="inbox-overlay" id="inboxOverlay" onclick="closeInbox()"></div>
<div class="inbox-sheet" id="inboxSheet">
  <div class="inbox-handle"></div>
  <div class="inbox-hdr">
    <div class="inbox-title" id="inboxTitle">Inbox</div>
    <button class="inbox-close" onclick="closeInbox()">&times;</button>
  </div>
  <div class="inbox-msgs" id="inboxMsgs"><div class="inbox-empty">No messages</div></div>
  <div class="inbox-send">
    <textarea class="inbox-input" id="inboxInput" placeholder="" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
    <button class="inbox-btn" id="inboxBtn" onclick="sendMsg()"></button>
  </div>
</div>

<!-- Recording Sheet -->
<div class="rec-overlay" id="recOverlay" onclick="closeRecMgmt()"></div>
<div class="rec-sheet" id="recSheet">
  <div class="rec-handle"></div>
  <div class="rec-hdr">
    <div class="rec-title" id="recMgmtTitle">Recording Management</div>
    <button class="rec-close" onclick="closeRecMgmt()">&times;</button>
  </div>
  <div id="recStatusBar"></div>
  <div class="rec-body" id="recBody"><div class="rec-empty">Loading...</div></div>
</div>

<script>
/* ── State ── */
let D=null, CF='active', EI={}, EC={}, curTab='overview';

// ── i18n ──
const I={

let curLang=localStorage.getItem('monitor-lang')||'zh';
function T(k){return I[curLang][k]||I.en[k]||k}
function toggleLang(){curLang=curLang==='zh'?'en':'zh';localStorage.setItem('monitor-lang',curLang);applyLang();if(D)render(D)}
function applyLang(){
  document.title=T('title');
  document.querySelector('.hdr-title').textContent=T('title');
  document.getElementById('langBtn').textContent=curLang==='zh'?'EN':'ZH';
  document.getElementById('tabOverview').textContent=T('overview');
  document.getElementById('tabProjects').textContent=T('proj');
  document.getElementById('tabStats').textContent=T('stats');
  document.getElementById('tabTeams').textContent=T('teams');

  document.getElementById('inboxBtn').textContent=T('send');
  document.getElementById('recMgmtTitle').textContent=T('recMgmt');
}

/* ── Helpers ── */
const E=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';
const FN=n=>n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':String(n);
function FA(s){if(s<60)return Math.floor(s)+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m';return Math.floor(s/86400)+'d'}
function FD(ms){const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return h>0?h+'h '+m+'m':m+'m'}
function SM(m){if(!m)return'';if(m.includes('opus-4-6'))return'Opus 4.6';if(m.includes('opus-4-5'))return'Opus 4.5';if(m.includes('sonnet-4-5'))return'Sonnet 4.5';if(m.includes('haiku-4-5'))return'Haiku 4.5';return m.split('-').slice(1,3).join(' ')}
function MC(m){if(m.includes('opus'))return'opus';if(m.includes('sonnet'))return'sonnet';if(m.includes('haiku'))return'haiku';return'opus'}

/* ── Clock ── */
function UC(){document.getElementById('clk').textContent=new Date().toLocaleTimeString('en-US',{hour12:false})}
setInterval(UC,1000);UC();

/* ── Tab Switching ── */
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  // Scroll to top
  document.querySelector('.tab-content').scrollTop=0;
}

/* ── Filter ── */
function setF(f){CF=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('on',b.dataset.f===f));if(D)renderProjects(D.projects)}

/* ── WebSocket ── */
let ws=null;
function conn(){
  const p=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${p}//${location.host}/ws`);
  ws.onopen=()=>{document.getElementById('wsDot').classList.remove('off');document.getElementById('wsTxt').textContent=T('live')};

/* ── Keyword Highlighting ── */
function highlightKW(raw){
  let t=E(raw);
  t=t.replace(/\b(TaskCreate|TaskUpdate|TaskList|TaskGet|TaskStop|TodoWrite)\b/g,'<span class="hl-task">$&</span>');
  t=t.replace(/\b(completed|done|resolved|finished|success|passed)\b/gi,'<span class="hl-done">$&</span>');
  t=t.replace(/\b(in_progress|in progress|working|implementing|running|processing|analyzing)\b/gi,'<span class="hl-prog">$&</span>');
  t=t.replace(/\b(pending|waiting|queued|blocked|todo|TODO)\b/g,'<span class="hl-pend">$&</span>');
  t=t.replace(/\b(Read|Write|Edit|Bash|Grep|Glob|WebFetch|WebSearch|Skill|NotebookEdit)\b/g,'<span class="hl-tool">$&</span>');
  t=t.replace(/\b(SendMessage|TeamCreate|TeamDelete|broadcast|shutdown)\b/g,'<span class="hl-team">$&</span>');
  t=t.replace(/\b(error|failed|failure|exception|bug|crash)\b/gi,'<span class="hl-err">$&</span>');
  return t;
}

/* ── Projects ── */
function renderProjects(projects){
  const el=document.getElementById('page-projects');

  let filtered;
  if(CF==='active'){filtered=projects.filter(p=>p.hasActive);if(!filtered.length)filtered=projects.filter(p=>p.hasRecent||p.hasActive);if(!filtered.length)filtered=projects.slice(0,8)}
  else if(CF==='recent'){filtered=projects.filter(p=>p.hasActive||p.hasRecent);if(!filtered.length)filtered=projects.slice(0,12)}

  let h=`<div class="filter-bar">
    <button class="fbtn ${CF==='active'?'on':''}" data-f="active" onclick="setF('active')">${T('active')}</button>

  for(const p of filtered){
    const glow=p.hasActive?'glow-g':p.hasRecent?'glow-o':'';

    h+=`<div class="card ${glow}"><div class="card-hdr">

    h+=`<span class="badge badge-b">${p.totalSessions}</span>`;
    h+=`</div></div>`;
    h+=`<div class="proj-path">${E(p.path)}</div>`;

    const actS=p.sessions.filter(s=>s.status==='active');
    const recS=p.sessions.filter(s=>s.status==='recent');

    for(const s of actS)h+=renderSess(s,true);

    if(idleS.length>0){
      const isO=EI[p.dirName]||false;

  }

function renderSess(s,det){
  let h=`<div class="sess ${s.status}"><div class="sess-r1"><div class="dot ${s.status==='active'?'dot-g':s.status==='recent'?'dot-o':'dot-idle'}"></div>`;
  h+=`<span class="sess-id">#${E(s.sessionId)}</span>`;
  if(s.live&&s.live.model)h+=`<span class="sess-model">${SM(s.live.model)}</span>`;
  if(s.gitBranch&&s.gitBranch!=='HEAD')h+=`<span class="sess-branch">${E(s.gitBranch)}</span>`;
  h+=`<span class="sess-age">${s.status==='active'?T('now'):FA(s.age)+' '+T('ago')}</span></div>`;

  if(s.summary)h+=`<div class="sess-sum">${E(s.summary)}</div>`;

  if(det){
    if(s.live&&s.live.lastUserMessage)h+=`<div class="sess-prompt">"${E(s.live.lastUserMessage)}"</div>`;
    else if(s.firstPrompt&&s.firstPrompt!=='No prompt')h+=`<div class="sess-prompt">"${E(s.firstPrompt)}"</div>`;

    h+=`<div class="sess-meta"><span><span class="v">${s.messageCount||0}</span> ${T('msgs')}</span>`;
    if(s.fileSize)h+=`<span><span class="v">${FN(s.fileSize)}</span> ${T('bytes')}</span>`;
    h+=`</div>`;

    if(s.live&&s.live.lastTool)h+=`<div class="sess-tool">&#9654; ${E(s.live.lastTool)}</div>`;
    if(s.live&&(s.live.inputTokens||s.live.outputTokens)){
      h+=`<div class="sess-tok"><span>${T('tokIn')}${FN(s.live.inputTokens)}</span><span>${T('tokOut')}${FN(s.live.outputTokens)}</span>`;
      if(s.live.cacheRead)h+=`<span>${T('tokCache')}${FN(s.live.cacheRead)}</span>`;
      h+=`</div>`;
    }

    // Conversation
    if(s.conversation&&s.conversation.length>0){
      const cid=s.fullId||s.sessionId;
      const isO=EC[cid]===true;
      h+=`<div class="convo"><div class="convo-hdr" onclick="togConvo('${E(cid)}')"><span><span class="convo-arr ${isO?'open':''}" id="ca-${E(cid)}">&#9654;</span> ${T('convo')} (${s.conversation.length})</span></div>`;
      h+=`<div class="convo-body ${isO?'open':''}" id="cb-${E(cid)}">`;
      for(const turn of s.conversation){
        if(turn.role==='user'){
          h+=`<div class="cv"><div class="cv-role u">U</div><div class="cv-content"><div class="cv-text">${E(turn.text)}</div></div></div>`;
        }else if(turn.role==='assistant'){
          h+=`<div class="cv"><div class="cv-role a">A</div><div class="cv-content">`;
          if(turn.text)h+=`<div class="cv-text">${E(turn.text)}</div>`;
          if(turn.tools&&turn.tools.length>0){
            h+=`<div class="cv-tools">`;
            for(const t of turn.tools)h+=`<span class="cv-tool-tag">${E(t)}</span>`;
            h+=`</div>`;
          }
          h+=`</div></div>`;
        }else if(turn.role==='tool_result'){
          h+=`<div class="cv"><div class="cv-role t">T</div><div class="cv-content"><div class="cv-text" style="color:var(--t3)">${E(turn.text)}</div></div></div>`;
        }
      }
      h+=`</div></div>`;
    }
  }else{
    h+=`<div class="sess-meta"><span><span class="v">${s.messageCount||0}</span> ${T('msgs')}</span></div>`;
  }
  h+=`</div>`;
  return h;
}

  }

  el.innerHTML=h;

/* ── Task ETA (当前任务倒计时) ── */
function taskETA(startedAt,avgMs){
  if(!startedAt||startedAt<=0)return{recording:true};
  const elapsed=Date.now()-startedAt;
  if(avgMs>0){
    const remain=avgMs-elapsed;
    if(remain<=0)return{overtime:elapsed-avgMs};
    return{ms:remain,elapsed:elapsed,avg:avgMs};
  }
  return{noHistory:true,elapsed:elapsed};
}
function fmtETA(ms){
  if(ms<60000)return'<1m';
  const s=Math.floor(ms/1000);
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>24)return Math.floor(h/24)+'d '+Math.floor(h%24)+'h';
  if(h>0)return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

/* ── Render Lead Pie Chart (Mobile) ── */
function renderMobilePie(teamStats,curTask){
  if(!teamStats||teamStats.total<=0)return'';
  const{total,completed,inProgress,pending,avgTaskMs,taskCount}=teamStats;
  const pctDone=Math.round((completed/total)*100);
  const degDone=(completed/total)*360;
  const degProg=degDone+(inProgress/total)*360;
  const conic=`conic-gradient(var(--green) 0deg ${degDone}deg, var(--orange) ${degDone}deg ${degProg}deg, var(--t3) ${degProg}deg 360deg)`;
  let h=`<div class="m-lead-pie">`;
  h+=`<div class="m-pie" style="background:${conic}"><div class="m-pie-hole"><span class="m-pie-pct">${pctDone}%</span></div></div>`;
  h+=`<div class="m-pie-info">`;
  h+=`<div class="m-pie-main">${T('overallProg')} ${completed}/${total}</div>`;
  h+=`<div class="m-pie-legend"><span class="m-pie-legend-i"><span class="m-pie-legend-d" style="background:var(--green)"></span>${completed} ${T('done')}</span><span class="m-pie-legend-i"><span class="m-pie-legend-d" style="background:var(--orange)"></span>${inProgress} ${T('inProg')}</span><span class="m-pie-legend-i"><span class="m-pie-legend-d" style="background:var(--t3)"></span>${pending} ${T('pend')}</span></div>`;
  if(completed>=total){h+=`<div class="m-pie-alldone">${T('allDone')}</div>`}
  else if(curTask&&curTask.startedAt){
    const eta=taskETA(curTask.startedAt,avgTaskMs||0);
    if(eta.ms!=null){h+=`<div class="m-pie-eta"><span class="m-pie-eta-icon">&#9201;</span><span class="m-pie-eta-label">${T('etaLabel')}</span><span class="m-pie-eta-time">${fmtETA(eta.ms)}</span></div>`}
    else if(eta.overtime!=null){h+=`<div class="m-pie-eta"><span class="m-pie-eta-icon" style="color:var(--red)">&#9201;</span><span class="m-pie-eta-label" style="color:var(--red)">${T('overtime')}</span><span class="m-pie-eta-time" style="color:var(--red)">+${fmtETA(eta.overtime)}</span></div>`}
    else if(eta.noHistory){h+=`<div class="m-pie-eta"><span class="m-pie-eta-label">${T('elapsed')}</span><span class="m-pie-eta-time">${fmtETA(eta.elapsed)}</span><span class="m-pie-eta-label" style="margin-left:4px">(${T('recording')})</span></div>`}
  } else if(taskCount>0){
    h+=`<div class="m-pie-eta"><span class="m-pie-eta-label">${T('avgTask')}</span><span class="m-pie-eta-time">${fmtETA(avgTaskMs)}</span><span class="m-pie-eta-label" style="margin-left:4px">(${taskCount})</span></div>`;
  }
  h+=`</div></div>`;
  return h;
}

    for(const r of sessR.slice(-3)){
      if(r.tools&&r.tools.length>0){h+=`<div class="m-areason-tools">`;for(const tl of r.tools)h+=`<span class="m-areason-tool">${E(tl)}</span>`;h+=`</div>`}
      if(r.text)h+=`<div class="m-areason-line"><span class="prefix">&gt;</span>${highlightKW(r.text)}</div>`;
    }
    for(const r of reasoning.slice(-3))h+=`<div class="m-areason-line"><span class="prefix">&gt;</span>${highlightKW(r.text)}</div>`;
    h+=`</div></div>`;
  }
  // Footer
  h+=`<div class="acard-m-footer">`;
  if(member.inboxMessages>0)h+=`<span class="acard-m-tag msgs">${member.inboxMessages} ${T('inbox')}</span>`;
  h+=`<span class="acard-m-tag inbox">${T('tapInbox')}</span>`;
  h+=`</div></div>`;
  return h;
}

/* ── Teams ── */
function renderTeams(teams,tasks){
  const el=document.getElementById('page-teams');
  let h='';

  // Task summary
  if(tasks&&tasks.total>0){
    h+=`<div class="section-title">${T('taskSummary')}</div><div class="card"><div class="card-body">`;
    h+=`<div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="stat-num g">${tasks.completed}</div><div class="stat-lbl">${T('done')}</div></div>
      <div class="stat-card"><div class="stat-num o">${tasks.inProgress}</div><div class="stat-lbl">${T('inProg')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--t2)">${tasks.pending}</div><div class="stat-lbl">${T('pend')}</div></div>
    </div></div></div>`;
  }

  if(!teams||teams.length===0){
    if(!tasks||tasks.total===0)h+=`<div class="empty">${T('noActive')}</div>`;
    el.innerHTML=h;
    return;
  }

  for(const team of teams){
    const activeN=team.members.filter(m=>m.active).length;
    const tasks_list=team.tasks||[];
    const lead=team.members.find(m=>m.name===team.leadName)||team.members.find(m=>m.agentType==='team-lead');
    const mates=team.members.filter(m=>m!==lead);
    const ownerTasks={};
    for(const t of tasks_list){const o=t.owner||'_unassigned';if(!ownerTasks[o])ownerTasks[o]=[];ownerTasks[o].push(t)}

    // Team header with overall progress
    const totalT=tasks_list.length,doneT=tasks_list.filter(t=>t.status==='completed').length;
    const progT=tasks_list.filter(t=>t.status==='in_progress').length;
    const pendT=tasks_list.filter(t=>t.status==='pending').length;
    const pctT=totalT>0?Math.round((doneT/totalT)*100):0;
    const pctP=totalT>0?Math.round((progT/totalT)*100):0;

    h+=`<div class="section-title">${E(team.name)}</div>`;
    h+=`<div class="card team-card"><div class="card-hdr">
      <div class="team-name">${E(team.name)}</div>
      <div style="font-size:11px;display:flex;gap:8px;align-items:center"><span style="color:var(--green)">${doneT}/${totalT} ${T('tasks')}</span><span class="team-status">${activeN}/${team.memberCount} ${T('activeLabel')}</span></div>
    </div>`;
    if(team.description)h+=`<div class="team-desc">${E(team.description)}</div>`;

    // Team-level progress bar
    if(totalT>0){
      h+=`<div class="m-team-prog"><div class="m-team-prog-bar"><div class="m-team-prog-done" style="width:${pctT}%"></div><div class="m-team-prog-wip" style="width:${pctP}%"></div></div>`;
      h+=`<div class="m-team-prog-info"><span><span style="color:var(--green)">${doneT}</span> ${T('done')}</span><span><span style="color:var(--orange)">${progT}</span> ${T('inProg')}</span><span><span style="color:var(--t2)">${pendT}</span> ${T('pend')}</span></div></div>`;
    }

    h+=`<div class="card-body">`;

    // Shared Task List (enhanced with activeForm)
    if(tasks_list.length>0){
      h+=`<div class="tnode-m"><div class="tnode-m-title">${T('sharedTasks')}</div>`;
      h+=`<div class="tnode-m-stats"><span style="color:var(--green)">${doneT} ${T('done')}</span><span style="color:var(--orange)">${progT} ${T('inProg')}</span><span style="color:var(--t2)">${pendT} ${T('pend')}</span></div>`;
      for(const t of tasks_list.slice(0,10)){
        const dc=t.status==='completed'?'done':t.status==='in_progress'?'prog':'pend';
        h+=`<div class="tnode-m-item"><div class="td ${dc}"></div><div class="tt ${dc==='done'?'done':''}">${E(t.subject)}`;
        if(t.status==='in_progress'&&t.activeForm)h+=` <span style="font-size:9px;color:var(--orange)">[${E(t.activeForm)}]</span>`;
        h+=`</div>${t.owner?`<div class="to">${E(t.owner)}</div>`:''}</div>`;
      }
      if(tasks_list.length>10)h+=`<div style="font-size:10px;color:var(--t3);text-align:center;padding:4px">+${tasks_list.length-10} ${T('more')}</div>`;
      h+=`</div>`;
    }

    // Lead Agent Card (enhanced)
    if(lead)h+=renderMobileAgentCard(lead,ownerTasks,team.name,true,{total:totalT,completed:doneT,inProgress:progT,pending:pendT,avgTaskMs:team.avgTaskMs||0,taskCount:team.taskCount||0});

    // Teammate Cards (enhanced)
    for(const m of mates)h+=renderMobileAgentCard(m,ownerTasks,team.name,false);

    h+=`</div>`; // /card-body

    // Communication Flow (enhanced visual)
    const msgs=(team.messageFlow||[]).filter(m=>m.type!=='idle');
    if(msgs.length>0){
      h+=`<div class="card-body" style="border-top:1px solid var(--border)">`;
      h+=`<div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:6px"><span style="flex:1;height:1px;background:var(--border)"></span>${T('commFlow')}<span style="flex:1;height:1px;background:var(--border)"></span></div>`;
      for(const m of msgs.slice(0,8)){
        const tc=m.type==='task'?'task':m.type==='shutdown'?'shutdown':'message';
        h+=`<div class="m-comm-entry ${tc}">
          <div class="m-comm-agents">
            <span class="m-comm-from">${E(m.from)}</span>
            <span class="m-comm-arrow">&#10132;</span>
            <span class="m-comm-to">${E(m.to)}</span>
            <span class="m-comm-badge ${tc}">${m.type}</span>
          </div>
          <div class="m-comm-text">${highlightKW(m.text)}</div>
        </div>`;
      }
      h+=`</div>`;
    }

    h+=`</div>`; // /team-card
  }

  el.innerHTML=h;
}

/* ── Inbox ── */
let inboxTeam='',inboxAgent='';
function openInbox(teamName,agentName){
  inboxTeam=teamName;inboxAgent=agentName;
  document.getElementById('inboxTitle').textContent=agentName+' - '+T('inbox');
  document.getElementById('inboxMsgs').innerHTML='<div class="inbox-empty">'+T('loading')+'</div>';
  document.getElementById('inboxInput').value='';
  document.getElementById('inboxOverlay').classList.add('open');
  document.getElementById('inboxSheet').classList.add('open');
  fetchInbox();
}
function closeInbox(){
  document.getElementById('inboxOverlay').classList.remove('open');
  document.getElementById('inboxSheet').classList.remove('open');
  inboxTeam='';inboxAgent='';
}
function fetchInbox(){
  fetch(`/api/teams/${encodeURIComponent(inboxTeam)}/inbox/${encodeURIComponent(inboxAgent)}`)
    .then(r=>r.json()).then(msgs=>{
      const el=document.getElementById('inboxMsgs');
      if(!msgs||!msgs.length){el.innerHTML='<div class="inbox-empty">'+T('noMsg')+'</div>';return}
      let h='';
      for(const m of msgs){
        const isHuman=m.from==='human-operator';
        const ts=m.timestamp?new Date(m.timestamp).toLocaleTimeString('en-US',{hour12:false}):'';
        h+=`<div class="inbox-msg">
          <span class="inbox-msg-from ${isHuman?'human':''}">${E(m.from)}</span>
          <div class="inbox-msg-body">
            <div class="inbox-msg-text">${E(m.text)}</div>
            <div class="inbox-msg-meta"><span>${ts}</span></div>
          </div>
          <span class="inbox-msg-type ${m.type}">${m.type}</span>
        </div>`;
      }
      el.innerHTML=h;
      el.scrollTop=el.scrollHeight;
    }).catch(()=>{document.getElementById('inboxMsgs').innerHTML='<div class="inbox-empty">'+T('failLoad')+'</div>'});
}
function sendMsg(){
  const input=document.getElementById('inboxInput');
  const text=input.value.trim();
  if(!text||!inboxTeam||!inboxAgent)return;
  const btn=document.getElementById('inboxBtn');
  btn.disabled=true;
  fetch(`/api/teams/${encodeURIComponent(inboxTeam)}/send`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({to:inboxAgent,text:text,summary:text.slice(0,80)})
  }).then(r=>r.json()).then(res=>{
    if(res.ok){input.value='';fetchInbox()}
    btn.disabled=false;
  }).catch(()=>{btn.disabled=false});
}

// ── Recording Functions ──
let recStartTime=null;
let recTimerInterval=null;
let _recording_active=false;
let recTouchTimer=null;

function updateRecUI(recData){
  const btn=document.getElementById('recBtn');
  const timeEl=document.getElementById('recTime');
  if(recData&&recData.active){
    btn.classList.add('active');
    timeEl.style.display='inline';
    if(!recStartTime&&recData.startTime)recStartTime=new Date(recData.startTime).getTime();
    if(!recTimerInterval){
      recTimerInterval=setInterval(()=>{
        if(!recStartTime)return;
        const elapsed=Date.now()-recStartTime;
        const s=Math.floor(elapsed/1000);
        const m=Math.floor(s/60),sec=s%60;
        timeEl.textContent=String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
      },1000);
    }
  }else{
    btn.classList.remove('active');
    timeEl.style.display='none';
    timeEl.textContent='';
    recStartTime=null;
    if(recTimerInterval){clearInterval(recTimerInterval);recTimerInterval=null}
  }
}

function toggleRecording(){
  const btn=document.getElementById('recBtn');
  if(btn.classList.contains('active')){
    fetch('/api/recording/stop',{method:'POST'}).then(r=>r.json()).then(res=>{
      updateRecUI({active:false});
    }).catch(()=>{});
  }else{
    fetch('/api/recording/start',{method:'POST'}).then(r=>r.json()).then(res=>{
      if(res.ok){
        updateRecUI({active:true,startTime:new Date().toISOString()});
      }
    }).catch(()=>{});
  }
}

// Long press to open management sheet
function recTouchStart(e){
  recTouchTimer=setTimeout(()=>{
    e.preventDefault();
    openRecMgmt();
    recTouchTimer=null;
  },600);
}
function recTouchEnd(e){
  if(recTouchTimer){clearTimeout(recTouchTimer);recTouchTimer=null}
}

function openRecMgmt(){
  document.getElementById('recOverlay').classList.add('open');
  document.getElementById('recSheet').classList.add('open');
  loadRecList();
}
function closeRecMgmt(){
  document.getElementById('recOverlay').classList.remove('open');
  document.getElementById('recSheet').classList.remove('open');
}

function loadRecList(){
  const body=document.getElementById('recBody');
  const bar=document.getElementById('recStatusBar');
  body.innerHTML='<div class="rec-empty">'+T('loading')+'</div>';
  bar.innerHTML='';
  fetch('/api/recording/list').then(r=>r.json()).then(recs=>{
    if(_recording_active&&D&&D.recording&&D.recording.active){
      const r=D.recording;
      bar.innerHTML=`<div class="rec-status-bar"><div class="rec-dot-lg"></div><span class="info">${T('recActive')} <span class="val">${E(r.id||'')}</span> | ${T('recSessions')}: <span class="val">${r.capturedSessions||0}</span></span></div>`;
    }else{bar.innerHTML=''}
    if(!recs||!recs.length){body.innerHTML='<div class="rec-empty">'+T('recNoRecordings')+'</div>';return}
    let h='';
    for(const rec of recs){
      const isActive=rec.status==='recording';
      const statusCls=isActive?'recording':'completed';
      const statusTxt=isActive?T('recActive'):T('recCompleted');
      let dur='';
      if(rec.startTime){
        const st=new Date(rec.startTime).getTime();
        const et=rec.endTime?new Date(rec.endTime).getTime():Date.now();
        const s=Math.floor((et-st)/1000);
        const m=Math.floor(s/60),sec=s%60;
        dur=m+'m '+sec+'s';
      }
      h+=`<div class="rec-item"><div class="rec-item-hdr">
        <div class="rec-item-id">${E(rec.id)}</div>
        <span class="rec-item-status ${statusCls}">${statusTxt}</span>
      </div>`;
      h+=`<div class="rec-item-meta">`;
      if(rec.startTime)h+=`<span>${new Date(rec.startTime).toLocaleString()}</span>`;
      if(dur)h+=`<span>${T('recDuration')}: <span class="v">${dur}</span></span>`;
      h+=`<span>${T('recSessions')}: <span class="v">${rec.capturedSessions||0}</span></span>`;
      h+=`</div>`;
      if(rec.files&&rec.files.length>0){
        h+=`<div class="rec-item-files">`;
        for(const f of rec.files)h+=`<a class="rec-file-link" href="/api/recording/${E(rec.id)}/files/${E(f)}" target="_blank">${E(f)}</a>`;
        h+=`</div>`;
      }
      if(!isActive){
        h+=`<div class="rec-item-actions">
          <button class="rec-action primary" onclick="recGenDocs('${E(rec.id)}')">${T('recGenDocs')}</button>
          <button class="rec-action" onclick="recSummarize('${E(rec.id)}')">${T('recSummary')}</button>
          <button class="rec-action" onclick="recGenSkill('${E(rec.id)}')">${T('recGenSkill')}</button>
        </div>`;
      }
      h+=`</div>`;
    }
    body.innerHTML=h;
  }).catch(()=>{body.innerHTML='<div class="rec-empty">'+T('failLoad')+'</div>'});
}

function recGenDocs(rid){
  fetch('/api/recording/'+rid+'/generate',{method:'POST'}).then(r=>r.json()).then(()=>{loadRecList()}).catch(()=>{});
}
function recSummarize(rid){
  fetch('/api/recording/'+rid+'/summarize',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(r=>r.json()).then(res=>{
    if(res.taskId)pollRecTask(res.taskId);
  }).catch(()=>{});
}
function recGenSkill(rid){
  fetch('/api/recording/'+rid+'/gen-skill',{method:'POST'}).then(r=>r.json()).then(res=>{
    if(res.taskId)pollRecTask(res.taskId);
  }).catch(()=>{});
}
function pollRecTask(taskId){
  const check=()=>{
    fetch('/api/recording/task/'+taskId).then(r=>r.json()).then(t=>{
      if(t.status==='running'){setTimeout(check,2000)}
      else{loadRecList()}
    }).catch(()=>{});
  };
  setTimeout(check,2000);
}
</script>
